<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de crud</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    
    <header>
        <h1>Ejemplo de gestion de usuarios</h1>
        <a href="../../index.html">← Regresar a página principal</a>
    </header>
    <main>
        <section class="formualrio-section">
            <h2 id="form-titulo">agregar nuevo usuario</h2>
            <form id="formulario-usuario" >
                <input type="hidden" id="id-usuario">
                <div class="campo"> <label for="nombre">nombre completo</label>
                <input type="text" id="nombre" placeholder="aqui va tu nombre" maxlength="60" required>
                                <span id="error-nombre" class="error" ></span>

                </div>
                <div class="campo"> <label for="nombre">fecha de nacimiento</label>
                <input type="date" id="fecha_nacimiento" placeholder="aqui va tu fecha de nacimiento" required>
                                <span id="error-fecha" class="error" ></span>

                </div>
                <div class="campo"> <label for="nombre">nota (0-10)</label>
                <input type="number" id="nota" placeholder="por ejemplo 8.5" min="0" max="10" required>
                                <span id="error-nota" class="error" ></span>

                </div>

                <button type="submit" id="btn-guardar">guardar</button>
                <button type="button" id="btn-cancelar" class="btn-secundario" style="display: none;">cancelar</button>
            </form>
        </section>
        <section class="tabla-section" >
            <h2>lista de usuario</h2>
            <p id="mensaje-carga">Cargando usuarios...</p>
            <p id="mensaje-vacio" style="display: none;">no hay usuarios registrados</p>
            <table id="tabla-usuarios" style="display: none;">
                <thead>
                    <tr>
                <th>id</th>
                <th>nombre</th>
                <th>fecha de nacimiento</th>
                <th>nota</th>
                <th>acciones</th>
            </tr>
                </thead>
                <tbody id="tbody-usuarios">

                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
