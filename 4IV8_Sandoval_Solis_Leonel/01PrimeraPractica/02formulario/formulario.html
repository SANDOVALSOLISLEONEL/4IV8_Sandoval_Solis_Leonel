            <p>todos los formularios que hay en internet tienen metodods de programacion por defecto.estos metodos nos sirven para poder hacer las acciones principales como son:
                acciones para poderse conectar con los servidores a traves de las arquitecturas cliente servidor vamos a tener por defecto que todos los formularios utilizan el metodo get y el segundo metodo principal es post aunque existen otros metodos que se encargan del intercambio de informacion
                Get este metodo envia por mediom de la url toda la informacion del formulario a traves del navegador su funcion principal es obtener los datos del servicio pero es el metodo mas vulnerable de todos derivado de que se pueden generar inyecciones de codigo
                Post este metodo se encarga de registrar una nueva entrada al sistema tambien utiliza la url como envio por defecto pero su facultad es poder ocultarla eso significa que los datos no son visibles para el usuario comun en el navegador
