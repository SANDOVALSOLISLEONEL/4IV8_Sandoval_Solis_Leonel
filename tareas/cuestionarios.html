<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicios-cuestionarios</title>
    <link rel="stylesheet" href="cuestionarios.css">
</head>
<body>
    <h1>Ejercicios</h1>

<h2>1) Inversión</h2>
<input type="text" id="capital" placeholder="Capital">
<div id="error1" class="mensaje"></div>
<button onclick="calcularInversion()">Calcular</button>
<div id="res1" class="resultado"></div>

<h2>2) Sueldo</h2>
<input type="text" id="sueldo" placeholder="Sueldo base">
<input type="text" id="v1" placeholder="Venta 1">
<input type="text" id="v2" placeholder="Venta 2">
<input type="text" id="v3" placeholder="Venta 3">
<div id="error2" class="mensaje"></div>
<button onclick="calcularSueldo()">Calcular</button>
<div id="res2" class="resultado"></div>


<h2>3) Descuento</h2>
<input type="text" id="compra" placeholder="Total compra">
<div id="error3" class="mensaje"></div>
<button onclick="calcularDescuento()">Calcular</button>
<div id="res3" class="resultado"></div>


<h2>4) Calificación</h2>
<input type="number" id="parcial" placeholder="Promedio parciales" min="0" max="10" step="0.1">
<input type="number" id="examen" placeholder="Examen" min="0" max="10" step="0.1">
<input type="number" id="trabajo" placeholder="Trabajo" min="0" max="10" step="0.1">
<div id="error4" class="mensaje"></div>
<button onclick="calcularCalificacion()">Calcular</button>
<div id="res4" class="resultado"></div>


<h2>5) Porcentaje</h2>
<input type="text" id="hombres" placeholder="Hombres">
<input type="text" id="mujeres" placeholder="Mujeres">
<div id="error5" class="mensaje"></div>
<button onclick="calcularPorcentaje()">Calcular</button>
<div id="res5" class="resultado"></div>


<h2>6) Edad</h2>

<input type="date" id="fechaNacimiento" min="1900-01-01" max="2018-12-31">
<div id="error6" class="mensaje"></div>
<button onclick="calcularEdad()">Calcular</button>
<div id="res6" class="resultado"></div>

<script src="cuestionarios.js"></script>
</body>
</html>
